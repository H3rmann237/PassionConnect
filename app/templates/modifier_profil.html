{% extends 'base.html' %}
{% block contenu %}

<div class="auth-container">
    <div class="auth-card" style="max-width: 600px;">
        <h1>Modifier le profil</h1>

        <form method="POST">
            <div class="form-group">
                <label>Bio</label>
                <textarea name="bio" rows="4" placeholder="Parle de toi...">{{ current_user.bio or '' }}</textarea>
            </div>

            <div class="form-group">
                <label>Tes passions</label>
                <div class="passions-checkboxes">
                    {% for passion in toutes_passions %}
                        <label class="checkbox-passion">
                            <input type="checkbox" name="passions" value="{{ passion.id }}">
                            <span>{{ passion.icone }} {{ passion.nom }}</span>
                        </label>
                    {% endfor %}
                </div>
            </div>

            <div class="form-actions">
                <a href="/profil" class="btn-gris">Annuler</a>
                <button type="submit" class="btn-rouge">Sauvegarder</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
