{% extends 'base.html' %}
{% block contenu %}

<div class="auth-container">
    <div class="auth-card">
        <h1>Inscription</h1>
        <p class="text-muted mb-4">Rejoins la communauté PassionConnect 🎨</p>

        <form method="POST">
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" name="username" placeholder="tonpseudo">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="ton@email.com">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-rouge btn-full">Créer mon compte</button>
        </form>

        <p class="auth-link">Déjà un compte ? <a href="/connexion">Se connecter</a></p>
    </div>
</div>

{% endblock %}
