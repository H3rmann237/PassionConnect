{% extends 'base.html' %}
{% block contenu %}

<div class="auth-container">
    <div class="auth-card">
        <h1>Connexion</h1>
        <p class="text-muted mb-4">Bon retour sur PassionConnect 👋</p>

        {% if erreur %}
            <div class="auth-erreur">{{ erreur }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="ton@email.com">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-rouge btn-full">Se connecter</button>
        </form>

        <p class="auth-link">Pas encore de compte ? <a href="/inscription">S'inscrire</a></p>
    </div>
</div>

{% endblock %}
