{% extends 'base.html' %}
{% block contenu %}

<div class="feed-header">
    <h1>Publications</h1>
    <a href="/publication/nouvelle" class="btn-rouge">+ Nouvelle publication</a>
</div>

<div class="feed">
    {% for post in publications %}
    <div class="post-card">
        <div class="post-author">
            <div class="post-avatar">{{ post.username[0].upper() }}</div>
            <div>
                <a href="/profil/{{ post.user_id }}" class="post-username">{{ post.username }}</a>
                <span class="post-date">{{ post.created_at }}</span>
            </div>
        </div>

        {% if post.image %}
            <img src="/static/uploads/{{ post.image }}" class="post-image">
        {% endif %}

        <p class="post-contenu">{{ post.contenu }}</p>

        <div class="post-actions">
            <form method="POST" action="/publication/like/{{ post.pub_id }}">
                <button type="submit" class="btn-like">
                    ❤️ <span>{{ post.nb_likes }}</span>
                </button>
            </form>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
