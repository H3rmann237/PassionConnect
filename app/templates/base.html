<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PassionConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <nav class="navbar-pc">
        <a class="navbar-brand-pc" href="/">Passion<span>Connect</span></a>
        <div class="nav-links">
            {% if current_user.is_authenticated %}
                <a href="/decouverte">Découvrir</a>
                <a href="/publication">Publications</a>
                <a href="/profil">Mon profil</a>
                <span class="nav-greeting">{{ current_user.username }}</span>
                <a href="/deconnexion" class="btn-rouge">Déconnexion</a>
            {% else %}
                <a href="/connexion" class="btn-gris">Connexion</a>
                <a href="/inscription" class="btn-rouge">Inscription</a>
            {% endif %}
        </div>
    </nav>
    <div class="main-content">
        {% block contenu %}{% endblock %}
    </div>
</body>
</html>
